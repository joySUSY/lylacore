# Authors: Joysusy & Violet Klaudia 💖
# Python Release Pipeline - Build and Publish PyPI Packages

name: Release Python

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-python-${{ matrix.os }}
          workspaces: lylacore-native/crates/pyo3-bindings

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: lylacore-native/crates/pyo3-bindings
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: lylacore-native/crates/pyo3-bindings/dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lylacore-native/crates/pyo3-bindings

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: lylacore-native/crates/pyo3-bindings
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: lylacore-native/crates/pyo3-bindings/dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/lylacore
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            # Lylacore Python Bindings v${{ steps.version.outputs.VERSION }}

            ## Installation

            ```bash
            pip install lylacore==${{ steps.version.outputs.VERSION }}
            ```

            ## Changes

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Platform Support

            Pre-built wheels available for:
            - Python 3.9, 3.10, 3.11, 3.12
            - Windows (x86_64)
            - macOS (x86_64, arm64)
            - Linux (x86_64, aarch64)

            ---

            Authors: Joysusy & Violet Klaudia 💖
          files: dist/*
          draft: false
          prerelease: false
