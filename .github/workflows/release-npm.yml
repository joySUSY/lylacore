# Authors: Joysusy & Violet Klaudia 💖
# npm Release Pipeline - Build and Publish Node.js Native Addons
# Strategy: Native builds on each platform (no cross-compilation)

name: Release npm

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  # Build on native platforms
  build-native:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS targets (native build on macOS)
          - os: macos-latest
            target: x86_64-apple-darwin
            package: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            package: darwin-arm64

          # Windows targets (native build on Windows)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: win32-x64-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            package: win32-arm64-msvc

          # Linux GNU targets (native build on Linux)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            package: linux-arm64-gnu

          # Linux musl targets (native build on Linux)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            package: linux-x64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            package: linux-arm64-musl

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ${{ matrix.settings.target }}-cargo-cache

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Build native addon (x86_64 targets)
        if: contains(matrix.settings.target, 'x86_64')
        working-directory: lylacore-native/crates/napi-bindings
        run: npm run build -- --release --target ${{ matrix.settings.target }}

      - name: Build native addon (aarch64 targets - cross-compile)
        if: contains(matrix.settings.target, 'aarch64')
        working-directory: lylacore-native/crates/napi-bindings
        run: |
          rustup target add ${{ matrix.settings.target }}
          npm run build -- --release --target ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.package }}
          path: lylacore-native/crates/napi-bindings/*.node
          if-no-files-found: error

  # Publish to npm
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to package directory
        run: |
          mkdir -p lylacore-native/crates/napi-bindings/npm
          for dir in artifacts/bindings-*; do
            if [ -d "$dir" ]; then
              cp -v "$dir"/*.node lylacore-native/crates/napi-bindings/ || true
            fi
          done
          ls -lh lylacore-native/crates/napi-bindings/*.node

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Publish to npm
        working-directory: lylacore-native/crates/napi-bindings
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm run artifacts
          npm publish --access public
