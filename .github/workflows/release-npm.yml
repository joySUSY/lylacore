# Authors: Joysusy & Violet Klaudia 💖
# npm Release Pipeline - Build and Publish Node.js Native Addons
# Based on NAPI-RS v3 Official Template (Native Cross-Compilation)

name: Release npm

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    name: build-${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Linux x64 GNU (native build)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu

          # Linux musl targets (native build with cargo-zigbuild)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            package: linux-x64-musl

          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            package: linux-arm64-musl

          # Linux aarch64 GNU (native build with --use-napi-cross)
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            package: linux-arm64-gnu

          # macOS targets (native build)
          - host: macos-latest
            target: x86_64-apple-darwin
            package: darwin-x64

          - host: macos-latest
            target: aarch64-apple-darwin
            package: darwin-arm64

          # Windows targets (native build)
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            package: win32-x64-msvc

          - host: windows-latest
            target: aarch64-pc-windows-msvc
            package: win32-arm64-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Setup Zig (for musl targets)
        if: ${{ contains(matrix.settings.target, 'musl') }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild (for musl targets)
        if: ${{ contains(matrix.settings.target, 'musl') }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.settings.target }}
          workspaces: lylacore-native

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Build native addon
        working-directory: lylacore-native/crates/napi-bindings
        shell: bash
        run: |
          if [[ "${{ matrix.settings.target }}" == *"musl"* ]]; then
            npm run build -- --target ${{ matrix.settings.target }} -x
          elif [[ "${{ matrix.settings.target }}" == *"linux-gnu"* ]]; then
            npm run build -- --target ${{ matrix.settings.target }} --use-napi-cross
          else
            npm run build -- --target ${{ matrix.settings.target }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.package }}
          path: lylacore-native/crates/napi-bindings/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for provenance
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to npm directory structure
        run: |
          # Create npm/<platform> directories as expected by napi artifacts
          for dir in artifacts/bindings-*; do
            if [ -d "$dir" ]; then
              pkg_name=$(basename "$dir" | sed 's/bindings-//')
              mkdir -p "lylacore-native/crates/napi-bindings/npm/$pkg_name"
              cp -v "$dir"/*.node "lylacore-native/crates/napi-bindings/npm/$pkg_name/"
            fi
          done
          ls -R lylacore-native/crates/napi-bindings/npm

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Publish to npm
        working-directory: lylacore-native/crates/napi-bindings
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm run artifacts
          npm publish --access public --provenance

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            # Lylacore v${{ steps.version.outputs.VERSION }}

            ## Installation

            ```bash
            npm install @lylacore/core@${{ steps.version.outputs.VERSION }}
            ```

            ## Platform Support

            Pre-built binaries are available for:
            - Linux x64 (GNU & musl)
            - Linux ARM64 (GNU & musl)
            - macOS x64 (Intel)
            - macOS ARM64 (Apple Silicon)
            - Windows x64
            - Windows ARM64

            ---

            Authors: Joysusy & Violet Klaudia 💖
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
