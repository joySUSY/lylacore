# Authors: Joysusy & Violet Klaudia 💖
# npm Release Pipeline - Build and Publish Node.js Native Addons
# Based on NAPI-RS Official Template (Docker for Linux cross-compilation)

name: Release npm

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    name: build-${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Linux x64 GNU (native build)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu

          # Linux musl targets (Docker build with Node.js 20)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            package: linux-x64-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine-20
            build: npm install && npm run build -- --target x86_64-unknown-linux-musl

          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            package: linux-arm64-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine-20
            build: |-
              set -e &&
              rustup target add aarch64-unknown-linux-musl &&
              npm install &&
              npm run build -- --target aarch64-unknown-linux-musl

          # Linux aarch64 GNU (use --use-napi-cross on native runner)
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            package: linux-arm64-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu --use-napi-cross

          # macOS targets (native build)
          - host: macos-latest
            target: x86_64-apple-darwin
            package: darwin-x64

          - host: macos-latest
            target: aarch64-apple-darwin
            package: darwin-arm64

          # Windows targets (native build)
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            package: win32-x64-msvc

          - host: windows-latest
            target: aarch64-pc-windows-msvc
            package: win32-arm64-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust dependencies
        if: ${{ !matrix.settings.docker }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.settings.target }}
          workspaces: lylacore-native/crates/napi-bindings

      - name: Install dependencies
        if: ${{ !matrix.settings.docker }}
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Build native addon (Docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: >-
            -v ${{ github.workspace }}:/build
            -w /build/lylacore-native/crates/napi-bindings
            -e CARGO_TERM_COLOR=always
          run: ${{ matrix.settings.build }}

      - name: Build native addon (Native)
        if: ${{ !matrix.settings.docker }}
        working-directory: lylacore-native/crates/napi-bindings
        run: npm run build -- --target ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.package }}
          path: lylacore-native/crates/napi-bindings/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to package directory
        run: |
          mkdir -p lylacore-native/crates/napi-bindings/npm
          for dir in artifacts/bindings-*; do
            if [ -d "$dir" ]; then
              cp -v "$dir"/*.node lylacore-native/crates/napi-bindings/ || true
            fi
          done
          ls -lh lylacore-native/crates/napi-bindings/*.node

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Publish to npm
        working-directory: lylacore-native/crates/napi-bindings
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm run artifacts
          npm publish --access public
