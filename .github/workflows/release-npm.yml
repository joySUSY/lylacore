# Authors: Joysusy & Violet Klaudia 💖
# npm Release Pipeline - Build and Publish Node.js Native Addons
# Based on NAPI-RS Industrial Template

name: Release npm

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    name: build-${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Linux GNU targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            package: linux-arm64-gnu

          # Linux musl targets
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            package: linux-x64-musl

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            package: linux-arm64-musl

          # macOS targets
          - os: macos-latest
            target: x86_64-apple-darwin
            package: darwin-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            package: darwin-arm64

          # Windows targets
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: win32-x64-msvc

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            package: win32-arm64-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ./target
          key: ${{ matrix.settings.target }}-cargo-cache

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Install zig (for musl/aarch64 cross-compilation)
        if: contains(matrix.settings.target, 'musl') || contains(matrix.settings.target, 'aarch64')
        run: cargo install cargo-zigbuild

      - name: Install musl tools
        if: contains(matrix.settings.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (native x86_64)
        if: contains(matrix.settings.target, 'x86_64') && !contains(matrix.settings.target, 'musl')
        working-directory: lylacore-native/crates/napi-bindings
        shell: bash
        run: npx napi build --release --target ${{ matrix.settings.target }}

      - name: Build (musl/aarch64 with zigbuild)
        if: contains(matrix.settings.target, 'musl') || contains(matrix.settings.target, 'aarch64')
        working-directory: lylacore-native/crates/napi-bindings
        shell: bash
        run: npx napi build --release --target ${{ matrix.settings.target }} --cargo-name zigbuild

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.package }}
          path: lylacore-native/crates/napi-bindings/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to package directory
        run: |
          mkdir -p lylacore-native/crates/napi-bindings/npm
          for dir in artifacts/bindings-*; do
            if [ -d "$dir" ]; then
              cp -v "$dir"/*.node lylacore-native/crates/napi-bindings/ || true
            fi
          done
          ls -lh lylacore-native/crates/napi-bindings/*.node

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Publish to npm
        working-directory: lylacore-native/crates/napi-bindings
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm run artifacts
          npm publish --access public
