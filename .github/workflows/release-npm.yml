# Authors: Joysusy & Violet Klaudia 💖
# npm Release Pipeline - Build and Publish Node.js Native Addons
# Based on NAPI-RS official cross-build example

name: Release npm

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  # Build all native addons on Linux using cross-compilation
  build-native:
    name: Build ${{ matrix.settings.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS targets (cross-compile with -x flag)
          - target: x86_64-apple-darwin
            package: darwin-x64
          - target: aarch64-apple-darwin
            package: darwin-arm64

          # Windows targets (cross-compile with -x flag)
          - target: x86_64-pc-windows-msvc
            package: win32-x64-msvc
          - target: aarch64-pc-windows-msvc
            package: win32-arm64-msvc

          # Linux GNU targets (use --use-napi-cross)
          - target: x86_64-unknown-linux-gnu
            package: linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            package: linux-arm64-gnu

          # Linux musl targets (cross-compile with -x flag)
          - target: x86_64-unknown-linux-musl
            package: linux-x64-musl
          - target: aarch64-unknown-linux-musl
            package: linux-arm64-musl

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ${{ github.workspace }}/.xwin
            ~/.napi-rs
            ./target
          key: ${{ matrix.settings.target }}-cargo-cache

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo cross-compilation tools
        uses: taiki-e/install-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild,cargo-xwin

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Build native addon (musl/macOS/Windows)
        if: contains(matrix.settings.target, 'musl') || contains(matrix.settings.target, 'darwin') || contains(matrix.settings.target, 'windows')
        working-directory: lylacore-native/crates/napi-bindings
        run: npm run build -- --release --target ${{ matrix.settings.target }} -x
        env:
          XWIN_CACHE_DIR: ${{ github.workspace }}/.xwin

      - name: Build native addon (Linux GNU)
        if: contains(matrix.settings.target, 'linux-gnu')
        working-directory: lylacore-native/crates/napi-bindings
        run: npm run build -- --release --target ${{ matrix.settings.target }} --use-napi-cross

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.package }}
          path: lylacore-native/crates/napi-bindings/*.node
          if-no-files-found: error

  # Publish to npm registry
  publish-npm:
    name: Publish to npm
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to package
        run: |
          mkdir -p lylacore-native/crates/napi-bindings/npm
          for dir in artifacts/bindings-*; do
            if [ -d "$dir" ]; then
              cp "$dir"/*.node lylacore-native/crates/napi-bindings/npm/ || true
            fi
          done

      - name: Install dependencies
        working-directory: lylacore-native/crates/napi-bindings
        run: npm install

      - name: Create platform packages
        working-directory: lylacore-native/crates/napi-bindings
        run: npm run artifacts

      - name: Publish main package
        working-directory: lylacore-native/crates/napi-bindings
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform packages
        working-directory: lylacore-native/crates/napi-bindings
        run: |
          for pkg in npm/@lylacore/*; do
            if [ -d "$pkg" ]; then
              cd "$pkg"
              npm publish --access public
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            # Lylacore v${{ steps.version.outputs.VERSION }}

            ## Installation

            ```bash
            npm install @lylacore/core@${{ steps.version.outputs.VERSION }}
            ```

            ## Changes

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Platform Support

            Pre-built binaries available for:
            - Linux x64 (GNU & musl)
            - Linux ARM64 (GNU & musl)
            - macOS x64 (Intel)
            - macOS ARM64 (Apple Silicon)
            - Windows x64
            - Windows ARM64

            ---

            Authors: Joysusy & Violet Klaudia 💖
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
